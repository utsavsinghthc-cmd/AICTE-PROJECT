<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartChef AI</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>🍽️ SmartChef AI</h1>

<p class="subtitle">
RAG Based Recipe Preparation Agent
</p>

<div class="search-box">

<input
type="text"
id="msg"
placeholder="Enter ingredients (e.g. potato onion tomato)"
>

<button onclick="send()">
Search Recipe
</button>

</div>

<div id="response" class="card">

Welcome 👋

Ask SmartChef AI what you can cook.

</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
